<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Pension ALM Framework Architecture</title>
  <desc id="desc">Architecture diagram showing the data layer, asset and liability domain models, valuation engines, balance-sheet builder, balance-sheet snapshot, and funding ratio.</desc>

  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 34px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #4b5563; }
      .section { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 12; }
      .box-dark { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 12; }
      .box-green { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 12; }
      .box-orange { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 12; }
      .text { font: 600 18px Arial, sans-serif; fill: #111827; }
      .small { font: 400 13px Arial, sans-serif; fill: #475569; }
      .label { font: 700 14px Arial, sans-serif; fill: #334155; letter-spacing: .04em; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
      .arrow-soft { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrowheadSoft); stroke-dasharray: 6 5; }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8.5" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arrowheadSoft" markerWidth="10" markerHeight="10" refX="8.5" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="820"/>

  <text class="title" x="600" y="55" text-anchor="middle">Pension ALM Framework Architecture</text>
  <text class="subtitle" x="600" y="82" text-anchor="middle">Modular scientific software architecture for pension asset-liability management</text>

  <rect class="section" x="410" y="115" width="380" height="105" rx="18"/>
  <text class="label" x="600" y="140" text-anchor="middle">DATA LAYER</text>
  <rect class="box" x="455" y="158" width="290" height="42" rx="12"/>
  <text class="text" x="600" y="185" text-anchor="middle">SQL / CSV / Excel / API</text>

  <path class="arrow" d="M600 220 L600 255"/>
  <rect class="box-dark" x="455" y="255" width="290" height="56" rx="12"/>
  <text class="text" x="600" y="278" text-anchor="middle">PortfolioFactory</text>
  <text class="small" x="600" y="298" text-anchor="middle">Builds portfolios from external data</text>

  <rect class="section" x="70" y="355" width="455" height="260" rx="18"/>
  <text class="label" x="297" y="382" text-anchor="middle">ASSET SIDE</text>

  <rect class="section" x="675" y="355" width="455" height="260" rx="18"/>
  <text class="label" x="902" y="382" text-anchor="middle">LIABILITY SIDE</text>

  <rect class="box" x="120" y="415" width="150" height="56" rx="12"/>
  <text class="text" x="195" y="439" text-anchor="middle">Asset</text>
  <text class="small" x="195" y="459" text-anchor="middle">abstract interface</text>

  <rect class="box" x="320" y="415" width="150" height="56" rx="12"/>
  <text class="text" x="395" y="439" text-anchor="middle">Bond</text>
  <text class="small" x="395" y="459" text-anchor="middle">fixed income</text>

  <rect class="box-green" x="220" y="525" width="200" height="60" rx="12"/>
  <text class="text" x="320" y="549" text-anchor="middle">Portfolio</text>
  <text class="small" x="320" y="570" text-anchor="middle">asset aggregation</text>

  <path class="arrow" d="M270 443 L320 443"/>
  <path class="arrow" d="M395 471 L342 525"/>
  <path class="arrow" d="M600 311 C600 340 392 337 320 525"/>

  <rect class="box" x="720" y="405" width="160" height="56" rx="12"/>
  <text class="text" x="800" y="429" text-anchor="middle">Member</text>
  <text class="small" x="800" y="449" text-anchor="middle">participant facts</text>

  <rect class="box" x="925" y="405" width="160" height="56" rx="12"/>
  <text class="text" x="1005" y="429" text-anchor="middle">Mortality</text>
  <text class="small" x="1005" y="449" text-anchor="middle">survival model</text>

  <rect class="box-green" x="760" y="505" width="290" height="60" rx="12"/>
  <text class="text" x="905" y="529" text-anchor="middle">PensionCashFlowProjector</text>
  <text class="small" x="905" y="550" text-anchor="middle">expected future pension payments</text>

  <rect class="box-orange" x="805" y="590" width="200" height="56" rx="12"/>
  <text class="text" x="905" y="614" text-anchor="middle">Liability</text>
  <text class="small" x="905" y="634" text-anchor="middle">pension obligation / DRS</text>

  <path class="arrow" d="M800 461 L850 505"/>
  <path class="arrow" d="M1005 461 L960 505"/>
  <path class="arrow" d="M905 565 L905 590"/>

  <rect class="section" x="340" y="650" width="520" height="90" rx="18"/>
  <text class="label" x="600" y="677" text-anchor="middle">VALUATION &amp; BALANCE SHEET LAYER</text>

  <rect class="box" x="375" y="695" width="170" height="38" rx="10"/>
  <text class="text" x="460" y="720" text-anchor="middle">DiscountEngine</text>

  <rect class="box" x="565" y="695" width="170" height="38" rx="10"/>
  <text class="text" x="650" y="720" text-anchor="middle">ValuationEngine</text>

  <rect class="box-dark" x="760" y="695" width="245" height="38" rx="10"/>
  <text class="text" x="882" y="720" text-anchor="middle">BalanceSheetBuilder</text>

  <path class="arrow" d="M420 585 C450 635 450 665 460 695"/>
  <path class="arrow" d="M905 646 C880 675 870 684 882 695"/>
  <path class="arrow-soft" d="M545 714 L565 714"/>

  <path class="arrow" d="M882 733 L882 765"/>
  <rect class="box-orange" x="735" y="765" width="295" height="42" rx="12"/>
  <text class="text" x="882" y="792" text-anchor="middle">BalanceSheetSnapshot → Funding Ratio</text>

  <text class="small" x="80" y="775">Core idea: assets and pension liabilities are projected into cash flows, valued consistently, and combined into balance-sheet snapshots.</text>
</svg>
